name: CI

on:
  push:
    branches: [main, develop, "release/*"]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: aiops_user
          POSTGRES_PASSWORD: aiops_pass
          POSTGRES_DB: aiops_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest tests/unit/ -v

      - name: Run integration tests
        env:
          TEST_DATABASE_URL: postgresql+asyncpg://aiops_user:aiops_pass@localhost:5432/aiops_test
          # LLM keys intentionally absent — pipeline runs in offline/heuristic mode
        run: |
          alembic upgrade head
          pytest tests/integration/ -v --cov=app --cov-fail-under=70
